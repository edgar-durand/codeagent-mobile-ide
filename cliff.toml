# git-cliff configuration
# https://git-cliff.org/docs/configuration
#
# Converts the Conventional Commits between the previous tag and the current
# tag into a Keep-a-Changelog-shaped section. Used by the release workflow to
# fill both the GitHub Release body and the per-package CHANGELOG.md files.
#
# Mirrors the configuration in codeagent-mobile-clients so the two repos
# produce identical-shaped release notes — anyone reading either changelog
# sees the same structure.

[changelog]
header = ""

body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first | split(pat="\n") | first }}{% if commit.breaking %} ⚠️ BREAKING CHANGE{% endif %}
{%- endfor %}
{% endfor %}
"""

trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# Map conventional-commit types to Keep-a-Changelog sections.
commit_parsers = [
  { message = "^feat",                  group = "Added" },
  { message = "^fix",                   group = "Fixed" },
  { message = "^perf",                  group = "Performance" },
  { message = "^refactor",              group = "Changed" },
  { message = "^docs",                  group = "Documentation" },
  { message = "^build",                 group = "Build" },
  { message = "^ci",                    group = "CI" },
  { message = "^test",                  group = "Tests" },
  { body    = ".*security",             group = "Security" },
  # Hide release-bookkeeping commits — they add no user-facing signal.
  { message = "^chore\\(release\\)",    skip = true },
  { message = "^chore\\(changelog\\)",  skip = true },
  { message = "^chore",                 group = "Chore" },
  { message = "^style",                 skip = true },
]

protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
